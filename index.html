<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Music Player Menu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; }
    body {
      background: #121212;
      color: #fff;
      font-family: "Segoe UI", sans-serif;
      margin: 0; padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }
    h1 {
      font-size: 5vw;
      margin: 5vw 0 3vw;
      text-align: center;
      z-index: 1;
    }
    .music-container {
      background: rgba(31,31,31,0.85);
      border-radius: 15px;
      padding: 5vw;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      z-index: 1;
      position: relative;
    }
    .track {
      background: #2a2a2a;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 10px;
      position: relative;
    }
    .track-title {
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 1.2em;
    }
    audio {
      width: 100%;
      border-radius: 8px;
    }
    video.bg-video {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      object-fit: cover;
      z-index: -1;
      display: none;
    }
    .loading-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      padding: 10px 20px;
      border-radius: 5px;
      display: none;
      font-size: 0.9em;
      z-index: 10;
    }
    .track.loading .loading-indicator {
      display: block;
    }
  </style>
</head>
<body>

  <h1 id="title">Music Player</h1>

  <!-- Video elements - preload="none" untuk performa lebih baik -->
  <video id="video-funk" class="bg-video" muted preload="none">
    <source src="https://files.catbox.moe/21926t.mp4" type="video/mp4" />
  </video>
  <video id="video-stay" class="bg-video" muted preload="none">
    <source src="https://files.catbox.moe/mh9uyb.mp4" type="video/mp4" />
  </video>
  <video id="video-girl" class="bg-video" muted preload="none">
    <source src="https://files.catbox.moe/tk75pg.mp4" type="video/mp4" />
  </video>

  <div class="music-container">
    <div class="track" data-track="0">
      <div class="loading-indicator">Loading video...</div>
      <div class="track-title">Irokz - Funk Universo</div>
      <audio controls data-trigger="73.3" data-video="video-funk">
        <source src="https://files.catbox.moe/6wsohl.mp3" type="audio/mp3" />
      </audio>
    </div>
    <div class="track" data-track="1">
      <div class="loading-indicator">Loading video...</div>
      <div class="track-title">Justin Bieber - STAY Remix</div>
      <audio controls data-trigger="25.3" data-video="video-stay">
        <source src="https://files.catbox.moe/q7n43k.mp3" type="audio/mp3" />
      </audio>
    </div>
    <div class="track" data-track="2">
      <div class="loading-indicator">Loading video...</div>
      <div class="track-title">Sinammota - Girl A</div>
      <audio controls data-trigger="69" data-video="video-girl">
        <source src="https://files.catbox.moe/8s572t.mp3" type="audio/mp3" />
      </audio>
    </div>
  </div>

  <script>
    const players = document.querySelectorAll("audio");
    const videos  = document.querySelectorAll("video.bg-video");
    const title   = document.getElementById("title");

    // Sync interval yang lebih cepat untuk menghindari drift
    const syncInterval = 200; // ms, sync tiap 200ms

    let currentActivePlayer = null;

    players.forEach(p => {
      const trigger = parseFloat(p.dataset.trigger);
      const videoEl = document.getElementById(p.dataset.video);
      const trackEl = p.closest('.track');
      
      let started   = false;
      let isVideoVisible = false;
      let syncTimer = null;
      let videoLoaded = false;

      // Preload video saat user hover/interact dengan track
      trackEl.addEventListener('mouseenter', () => {
        if (!videoLoaded && videoEl.readyState < 2) {
          videoEl.load();
        }
      }, { once: true });

      // Video loading handlers
      videoEl.addEventListener('loadeddata', () => {
        videoLoaded = true;
        trackEl.classList.remove('loading');
      });

      videoEl.addEventListener('waiting', () => {
        trackEl.classList.add('loading');
      });

      videoEl.addEventListener('canplay', () => {
        trackEl.classList.remove('loading');
      });

      function showVideoAt(time) {
        // Load video jika belum loaded
        if (!videoLoaded && videoEl.readyState < 2) {
          trackEl.classList.add('loading');
          videoEl.load();
        }

        if (!isVideoVisible) {
          // Sembunyikan semua video lain
          videos.forEach(v => {
            if (v !== videoEl) {
              v.pause();
              v.style.display = "none";
            }
          });

          videoEl.style.display = "block";
          title.textContent = "EASTER EGG FOUND";
          isVideoVisible = true;
        }
        
        videoEl.currentTime = Math.max(0, time - trigger);
        
        // Play dengan promise handling
        const playPromise = videoEl.play();
        if (playPromise !== undefined) {
          playPromise.catch(err => {
            console.log("Video play prevented:", err);
          });
        }
        
        started = true;
        startSync();
      }

      function hideVideo() {
        if (isVideoVisible) {
          videoEl.pause();
          videoEl.currentTime = 0;
          videoEl.style.display = "none";
          title.textContent = "Music Player";
          isVideoVisible = false;
        }
        started = false;
        trackEl.classList.remove('loading');
        stopSync();
      }

      function syncVideo() {
        if (!p.paused && started && !videoEl.paused) {
          let targetTime = Math.max(0, p.currentTime - trigger);
          let diff = Math.abs(videoEl.currentTime - targetTime);
          // Sync jika difference lebih dari 0.3 detik
          if (diff > 0.3) {
            videoEl.currentTime = targetTime;
          }
        }
      }

      function startSync() {
        stopSync();
        syncTimer = setInterval(syncVideo, syncInterval);
      }

      function stopSync() {
        if (syncTimer) {
          clearInterval(syncTimer);
          syncTimer = null;
        }
      }

      // Event: saat audio mulai play
      p.addEventListener("play", () => {
        // Pause semua player lain
        players.forEach(o => { 
          if (o !== p) {
            o.pause();
          }
        });

        // Reset semua video lain
        videos.forEach(v => { 
          if (v !== videoEl) { 
            v.pause(); 
            v.currentTime = 0;
            v.style.display = "none"; 
          }
        });

        currentActivePlayer = p;

        // Jika sudah melewati trigger point, langsung show video
        if (p.currentTime >= trigger) {
          showVideoAt(p.currentTime);
        } else if (started) {
          // Resume video jika sudah started sebelumnya
          if (videoEl.paused) {
            videoEl.play().catch(err => console.log("Resume failed:", err));
          }
        }
      });

      // Event: update waktu audio
      p.addEventListener("timeupdate", () => {
        const t = p.currentTime;
        
        // Trigger video saat mencapai waktu tertentu
        if (!started && t >= trigger && !p.paused) {
          showVideoAt(t);
        }
        
        // Hide video saat audio selesai
        if (started && p.ended) {
          hideVideo();
        }
      });

      // Event: saat user seek/skip
      p.addEventListener("seeked", () => {
        const t = p.currentTime;
        if (t >= trigger && !p.paused) {
          showVideoAt(t);
        } else {
          hideVideo();
        }
      });

      // Event: pause audio = pause video
      p.addEventListener("pause", () => {
        if (started) {
          videoEl.pause();
        }
      });

      // Event: video selesai
      videoEl.addEventListener("ended", () => {
        hideVideo();
        p.pause();
      });

      // Cleanup saat audio selesai
      p.addEventListener("ended", () => {
        hideVideo();
      });
    });

    // Cleanup saat page visibility berubah
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        players.forEach(p => p.pause());
        videos.forEach(v => v.pause());
      }
    });
  </script>
</body>
</html>
