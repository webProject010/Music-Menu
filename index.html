<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Music Player Menu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; }
    body {
      background: #121212;
      color: #fff;
      font-family: "Segoe UI", sans-serif;
      margin: 0; padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }
    h1 {
      font-size: 5vw;
      margin: 5vw 0 3vw;
      text-align: center;
      z-index: 1;
      transition: all 1s ease;
    }
    h1.hide-ui {
      transform: translateY(-150px);
      opacity: 0;
      pointer-events: none;
    }
    .controls {
      display: flex;
      gap: 15px;
      margin-bottom: 2vw;
      z-index: 2;
      align-items: center;
    }
    .toggle-btn {
      background: rgba(100, 100, 100, 0.8);
      border: 2px solid #666;
      color: #fff;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9em;
      transition: all 0.3s ease;
      font-weight: bold;
    }
    .toggle-btn.active {
      background: rgba(76, 175, 80, 0.8);
      border-color: #4caf50;
      box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
    }
    .toggle-btn:hover {
      transform: scale(1.05);
    }
    .music-container {
      background: rgba(31,31,31,0.85);
      border-radius: 15px;
      padding: 5vw;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      z-index: 1;
      position: relative;
      transition: all 1s ease;
    }
    .music-container.hide-ui {
      transform: translateY(200px);
      opacity: 0;
      pointer-events: none;
    }
    .track {
      background: #2a2a2a;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 10px;
      position: relative;
    }
    .track-title {
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 1.2em;
    }
    audio {
      width: 100%;
      border-radius: 8px;
    }
    video.bg-video {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      object-fit: cover;
      z-index: -1;
      display: none;
    }
    .status-indicator {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 0.8em;
      display: none;
      z-index: 10;
    }
    .status-indicator.buffering {
      display: block;
      color: #ff9800;
    }
    .status-indicator.ready {
      display: block;
      color: #4caf50;
    }
  </style>
</head>
<body>

  <h1 id="title">Music Player</h1>

  <div class="controls">
    <button class="toggle-btn" id="hardSyncToggle">Hard Sync: OFF</button>
  </div>

  <!-- Video elements -->
  <video id="video-funk" class="bg-video" muted preload="metadata">
    <source src="https://files.catbox.moe/21926t.mp4" type="video/mp4" />
  </video>
  <video id="video-stay" class="bg-video" muted preload="metadata">
    <source src="https://files.catbox.moe/mh9uyb.mp4" type="video/mp4" />
  </video>
  <video id="video-girl" class="bg-video" muted preload="metadata">
    <source src="https://files.catbox.moe/tk75pg.mp4" type="video/mp4" />
  </video>

  <div class="music-container">
    <div class="track" data-track="0">
      <div class="status-indicator"></div>
      <div class="track-title">Irokz - Funk Universo</div>
      <audio controls data-trigger="73.3" data-video="video-funk">
        <source src="https://files.catbox.moe/6wsohl.mp3" type="audio/mp3" />
      </audio>
    </div>
    <div class="track" data-track="1">
      <div class="status-indicator"></div>
      <div class="track-title">Justin Bieber - STAY Remix</div>
      <audio controls data-trigger="25.3" data-video="video-stay">
        <source src="https://files.catbox.moe/q7n43k.mp3" type="audio/mp3" />
      </audio>
    </div>
    <div class="track" data-track="2">
      <div class="status-indicator"></div>
      <div class="track-title">Sinammota - Girl A</div>
      <audio controls data-trigger="69" data-video="video-girl">
        <source src="https://files.catbox.moe/8s572t.mp3" type="audio/mp3" />
      </audio>
    </div>
  </div>

  <script>
    const players = document.querySelectorAll("audio");
    const videos  = document.querySelectorAll("video.bg-video");
    const title   = document.getElementById("title");
    const hardSyncToggle = document.getElementById("hardSyncToggle");

    // Global Hard Sync state
    let hardSyncMode = false;

    hardSyncToggle.addEventListener('click', () => {
      hardSyncMode = !hardSyncMode;
      hardSyncToggle.textContent = hardSyncMode ? 'Hard Sync: ON' : 'Hard Sync: OFF';
      hardSyncToggle.classList.toggle('active', hardSyncMode);
    });

    // Konfigurasi sync
    const SYNC_CHECK_INTERVAL = 500;   // Check sync lebih sering untuk catch drift
    const DRIFT_THRESHOLD = 1.0;       // Hard sync jika drift > 1 detik
    const END_BUFFER = 2.0;            // Hide 2 detik sebelum akhir
    const SEEK_DEBOUNCE = 300;         // Debounce seek
    const MIN_BUFFERED_DURATION = 2.0; // Tunggu sampai 2 detik buffered sebelum play
    const SYNC_START_DELAY = 500;      // Delay 0.5 detik sebelum mulai sync (faster!)

    players.forEach(p => {
      const trigger = parseFloat(p.dataset.trigger);
      const videoEl = document.getElementById(p.dataset.video);
      const trackEl = p.closest('.track');
      const statusEl = trackEl.querySelector('.status-indicator');
      
      let started = false;
      let isVideoVisible = false;
      let syncTimer = null;
      let videoDuration = 0;
      let isSeeking = false;
      let seekDebounceTimer = null;
      let isNearEnd = false;
      let lastAttemptedSeekTime = -1;
      let videoWaitingCounter = 0;
      let transitionStarted = false;
      let syncStartTimer = null;

      // Preload video saat user interact
      trackEl.addEventListener('mouseenter', () => {
        if (videoEl.readyState < 3) {
          videoEl.load();
          updateStatus('Preloading...');
        }
      }, { once: true });

      // Update status indicator
      function updateStatus(text) {
        statusEl.textContent = text;
        statusEl.className = 'status-indicator';
        if (text.includes('Buffering') || text.includes('Loading') || text.includes('Waiting')) {
          statusEl.classList.add('buffering');
        } else if (text.includes('Ready')) {
          statusEl.classList.add('ready');
          setTimeout(() => statusEl.style.display = 'none', 2000);
        }
      }

      // Helper: check buffered data at specific time
      function isBufferedAtTime(time) {
        if (!videoEl.buffered || videoEl.buffered.length === 0) return false;
        
        for (let i = 0; i < videoEl.buffered.length; i++) {
          const start = videoEl.buffered.start(i);
          const end = videoEl.buffered.end(i);
          if (time >= start - 0.5 && time <= end) {
            return true;
          }
        }
        return false;
      }

      function getBufferedDuration() {
        if (!videoEl.buffered || videoEl.buffered.length === 0) return 0;
        let total = 0;
        for (let i = 0; i < videoEl.buffered.length; i++) {
          total += videoEl.buffered.end(i) - videoEl.buffered.start(i);
        }
        return total;
      }

      // Video event handlers
      videoEl.addEventListener('loadedmetadata', () => {
        videoDuration = videoEl.duration;
        updateStatus('Video Ready');
      });

      videoEl.addEventListener('canplaythrough', () => {
        updateStatus('Video Ready');
      });

      videoEl.addEventListener('waiting', () => {
        videoWaitingCounter++;
        if (videoWaitingCounter > 2) {
          updateStatus('Buffering...');
        }
      });

      videoEl.addEventListener('playing', () => {
        videoWaitingCounter = 0;
        statusEl.style.display = 'none';
      });

      videoEl.addEventListener('stalled', () => {
        updateStatus('Network slow...');
      });

      videoEl.addEventListener('seeking', () => {
        isSeeking = true;
      });

      videoEl.addEventListener('seeked', () => {
        isSeeking = false;
        videoWaitingCounter = 0;
      });

      videoEl.addEventListener('pause', () => {
        if (started && !p.paused && isVideoVisible) {
          setTimeout(() => {
            if (started && !p.paused && videoEl.paused && isVideoVisible) {
              videoEl.play().catch(() => {});
            }
          }, 500);
        }
      });

      videoEl.addEventListener('error', (e) => {
        console.error('Video error:', e);
        updateStatus('Video error!');
        fullReset();
      });

      // Helper: cek apakah waktu valid
      function isValidVideoTime(time) {
        if (!videoDuration || videoDuration === 0) {
          videoDuration = videoEl.duration || 0;
        }
        return time >= 0 && time < (videoDuration - 0.1);
      }

      // Helper: clamp time
      function clampVideoTime(time) {
        if (!videoDuration || videoDuration === 0) {
          videoDuration = videoEl.duration || 0;
        }
        const maxTime = Math.max(0, videoDuration - 0.5);
        return Math.max(0, Math.min(time, maxTime));
      }

      // Helper: cek near end
      function checkIfNearEnd() {
        if (!videoDuration) {
          videoDuration = videoEl.duration || 0;
        }
        if (videoDuration === 0) return false;
        
        const targetVideoTime = Math.max(0, p.currentTime - trigger);
        return targetVideoTime > (videoDuration - 0.5);
      }

      // Full reset
      function fullReset() {
        stopSync();
        if (seekDebounceTimer) {
          clearTimeout(seekDebounceTimer);
          seekDebounceTimer = null;
        }
        if (syncStartTimer) {
          clearTimeout(syncStartTimer);
          syncStartTimer = null;
        }
        
        // Restore UI animation
        title.classList.remove('hide-ui');
        const musicContainer = document.querySelector('.music-container');
        musicContainer.classList.remove('hide-ui');
        
        videoEl.pause();
        videoEl.currentTime = 0;
        videoEl.playbackRate = 1.0;
        videoEl.style.display = "none";
        started = false;
        isVideoVisible = false;
        isNearEnd = false;
        isSeeking = false;
        lastAttemptedSeekTime = -1;
        videoWaitingCounter = 0;
        transitionStarted = false;
        if (title.textContent === "EASTER EGG FOUND") {
          title.textContent = "Music Player";
        }
        statusEl.style.display = 'none';
      }

      function showVideoAt(time) {
        // Jangan show kalau mendekati akhir
        if (checkIfNearEnd()) {
          isNearEnd = true;
          videoEl.playbackRate = 1.0;
          stopSync();
          return;
        }

        isNearEnd = false;

        if (!isVideoVisible) {
          // Hide all other videos
          videos.forEach(v => {
            if (v !== videoEl) {
              v.pause();
              v.style.display = "none";
              v.playbackRate = 1.0;
            }
          });

          videoEl.style.display = "block";
          title.textContent = "EASTER EGG FOUND";
          isVideoVisible = true;

          // Mulai transisi sekarang
          title.classList.add('hide-ui');
          trackEl.closest('.music-container').classList.add('hide-ui');
          transitionStarted = true;
        }
        
        const targetTime = Math.max(0, time - trigger);
        const safeTime = clampVideoTime(targetTime);
        
        if (!isValidVideoTime(safeTime)) {
          fullReset();
          return;
        }

        if (!isBufferedAtTime(safeTime) && getBufferedDuration() < MIN_BUFFERED_DURATION) {
          updateStatus('Buffering...');
          setTimeout(() => {
            if (!p.paused && started) {
              showVideoAt(time);
            }
          }, 300);
          return;
        }

        videoEl.currentTime = safeTime;
        
        // PLAY setelah 1 detik transisi
        setTimeout(() => {
          if (!p.paused && started && !isNearEnd) {
            const tryPlay = () => {
              if ((videoEl.readyState >= 2 || isBufferedAtTime(safeTime)) && !isSeeking) {
                const playPromise = videoEl.play();
                if (playPromise !== undefined) {
                  playPromise.catch(err => {
                    console.log("Play prevented:", err);
                    setTimeout(tryPlay, 200);
                  });
                }
              } else {
                updateStatus('Loading...');
                setTimeout(tryPlay, 200);
              }
            };
            
            tryPlay();
            
            // Start sync IMMEDIATELY setelah play (untuk catch drift dari awal)
            startSync();
          }
        }, 1000);

        started = true;
      }

      function hideVideo() {
        fullReset();
      }

      function syncVideo() {
        if (!p.paused && started && !isSeeking && videoEl.readyState >= 2) {
          const audioTime = p.currentTime;
          const targetVideoTime = Math.max(0, audioTime - trigger);
          
          if (!videoDuration) {
            videoDuration = videoEl.duration || 0;
          }
          
          // Stop sync kalau mendekati akhir
          if (videoDuration > 0 && targetVideoTime > (videoDuration - END_BUFFER - 3.0)) {
            isNearEnd = true;
            videoEl.playbackRate = 1.0;
            stopSync();
            return;
          }

          const currentVideoTime = videoEl.currentTime;
          const drift = targetVideoTime - currentVideoTime;
          const absDrift = Math.abs(drift);

          // Hard Sync Mode: seek langsung
          if (hardSyncMode && absDrift > 0.1) {
            const safeTime = clampVideoTime(targetVideoTime);
            if (targetVideoTime < (videoDuration - END_BUFFER - 2.0)) {
              if (isBufferedAtTime(safeTime) && !isSeeking) {
                console.log(`[HARD SYNC] Seeking (drift: ${absDrift.toFixed(2)}s)...`);
                videoEl.currentTime = safeTime;
                lastAttemptedSeekTime = safeTime;
              }
            }
            videoEl.playbackRate = 1.0;
            return;
          }

          // Auto Mode: Playback rate adjustment untuk catch drift gradually
          if (absDrift > 0.1) {
            let newRate = 1.0;
            
            if (drift > 0) {
              // Video ketinggalan, speedup!
              // Rate = 1.0 + (drift * 0.1) capped at 1.15x
              newRate = Math.min(1.0 + (Math.abs(drift) * 0.1), 1.15);
              console.log(`Video lag ${drift.toFixed(2)}s → speed ${newRate.toFixed(3)}x`);
            } else {
              // Video lebih cepat, slowdown!
              // Rate = 1.0 - (drift * 0.1) capped at 0.85x
              newRate = Math.max(1.0 + (drift * 0.1), 0.85);
              console.log(`Video ahead ${Math.abs(drift).toFixed(2)}s → speed ${newRate.toFixed(3)}x`);
            }
            
            videoEl.playbackRate = newRate;
          } else {
            // Drift < 0.1s, sinkron sudah baik
            videoEl.playbackRate = 1.0;
          }
        }
      }

      function startSync() {
        stopSync();
        syncTimer = setInterval(syncVideo, SYNC_CHECK_INTERVAL);
      }

      function stopSync() {
        if (syncTimer) {
          clearInterval(syncTimer);
          syncTimer = null;
        }
      }

      // Audio play event
      p.addEventListener("play", () => {
        isNearEnd = false;
        lastAttemptedSeekTime = -1;
        videoWaitingCounter = 0;
        transitionStarted = false;

        // Pause other players
        players.forEach(o => { 
          if (o !== p) o.pause();
        });

        // Reset other videos
        videos.forEach(v => { 
          if (v !== videoEl) { 
            v.pause(); 
            v.currentTime = 0;
            v.playbackRate = 1.0;
            v.style.display = "none"; 
          }
        });

        if (checkIfNearEnd()) {
          isNearEnd = true;
          fullReset();
          return;
        }

        if (p.currentTime >= trigger && !isNearEnd) {
          showVideoAt(p.currentTime);
        } else if (started && videoEl.paused && !isNearEnd) {
          videoEl.play().catch(() => {});
        }
      });

      // Audio time update
      p.addEventListener("timeupdate", () => {
        const t = p.currentTime;
        
        // Trigger transisi 1 detik SEBELUM audio reach trigger
        if (!transitionStarted && !started && (t >= trigger - 1.0) && (t < trigger) && !p.paused) {
          // Mulai transisi lebih awal
          if (!isVideoVisible) {
            videos.forEach(v => {
              if (v !== videoEl) {
                v.pause();
                v.style.display = "none";
                v.playbackRate = 1.0;
              }
            });

            videoEl.style.display = "block";
            title.textContent = "EASTER EGG FOUND";
            isVideoVisible = true;

            title.classList.add('hide-ui');
            trackEl.closest('.music-container').classList.add('hide-ui');
            transitionStarted = true;
          }
        }
        
        // Trigger video saat mencapai waktu
        if (!started && t >= trigger && !p.paused && !isNearEnd) {
          showVideoAt(t);
        }
        
        if (checkIfNearEnd()) {
          if (!isNearEnd) {
            isNearEnd = true;
            stopSync();
            videoEl.playbackRate = 1.0;
          }
          return;
        } else {
          isNearEnd = false;
        }
        
        // Hide video saat audio selesai
        if (started && p.ended) {
          fullReset();
        }
      });

      // Seek handling dengan debounce
      p.addEventListener("seeking", () => {
        stopSync();
      });

      p.addEventListener("seeked", () => {
        if (seekDebounceTimer) {
          clearTimeout(seekDebounceTimer);
        }

        seekDebounceTimer = setTimeout(() => {
          const t = p.currentTime;
          
          isNearEnd = false;
          lastAttemptedSeekTime = -1;
          transitionStarted = false;

          if (checkIfNearEnd()) {
            isNearEnd = true;
            fullReset();
            return;
          }

          if (t >= trigger && !p.paused && !isNearEnd) {
            fullReset();
            setTimeout(() => {
              if (!p.paused && !isNearEnd) {
                showVideoAt(t);
              }
            }, 50);
          } else {
            fullReset();
          }
        }, SEEK_DEBOUNCE);
      });

      // Audio pause
      p.addEventListener("pause", () => {
        if (started) {
          videoEl.pause();
          videoEl.playbackRate = 1.0;
        }
      });

      // Video/Audio ended
      videoEl.addEventListener("ended", () => {
        fullReset();
      });

      p.addEventListener("ended", () => {
        fullReset();
      });
    });

    // Page visibility
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        players.forEach(p => p.pause());
        videos.forEach(v => {
          v.pause();
          v.playbackRate = 1.0;
        });
      }
    });
  </script>
</body>
</html>
