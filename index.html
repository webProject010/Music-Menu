<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Music Player Menu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; }
    body {
      background: #121212;
      color: #fff;
      font-family: "Segoe UI", sans-serif;
      margin: 0; padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }
    h1 {
      font-size: 5vw;
      margin: 5vw 0 3vw;
      text-align: center;
      z-index: 1;
    }
    .music-container {
      background: rgba(31,31,31,0.85);
      border-radius: 15px;
      padding: 5vw;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      z-index: 1;
      position: relative;
    }
    .track {
      background: #2a2a2a;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 10px;
      position: relative;
    }
    .track-title {
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 1.2em;
    }
    audio {
      width: 100%;
      border-radius: 8px;
    }
    video.bg-video {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      object-fit: cover;
      z-index: -1;
      display: none;
    }
    .status-indicator {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 0.8em;
      display: none;
      z-index: 10;
    }
    .status-indicator.buffering {
      display: block;
      color: #ff9800;
    }
    .status-indicator.ready {
      display: block;
      color: #4caf50;
    }
  </style>
</head>
<body>

  <h1 id="title">Music Player</h1>

  <!-- Video elements -->
  <video id="video-funk" class="bg-video" muted preload="metadata">
    <source src="https://files.catbox.moe/21926t.mp4" type="video/mp4" />
  </video>
  <video id="video-stay" class="bg-video" muted preload="metadata">
    <source src="https://files.catbox.moe/mh9uyb.mp4" type="video/mp4" />
  </video>
  <video id="video-girl" class="bg-video" muted preload="metadata">
    <source src="https://files.catbox.moe/tk75pg.mp4" type="video/mp4" />
  </video>

  <div class="music-container">
    <div class="track" data-track="0">
      <div class="status-indicator"></div>
      <div class="track-title">Irokz - Funk Universo</div>
      <audio controls data-trigger="73.3" data-video="video-funk">
        <source src="https://files.catbox.moe/6wsohl.mp3" type="audio/mp3" />
      </audio>
    </div>
    <div class="track" data-track="1">
      <div class="status-indicator"></div>
      <div class="track-title">Justin Bieber - STAY Remix</div>
      <audio controls data-trigger="25.3" data-video="video-stay">
        <source src="https://files.catbox.moe/q7n43k.mp3" type="audio/mp3" />
      </audio>
    </div>
    <div class="track" data-track="2">
      <div class="status-indicator"></div>
      <div class="track-title">Sinammota - Girl A</div>
      <audio controls data-trigger="69" data-video="video-girl">
        <source src="https://files.catbox.moe/8s572t.mp3" type="audio/mp3" />
      </audio>
    </div>
  </div>

  <script>
    const players = document.querySelectorAll("audio");
    const videos  = document.querySelectorAll("video.bg-video");
    const title   = document.getElementById("title");

    // Konfigurasi sync yang MUCH LESS AGGRESSIVE
    const SYNC_CHECK_INTERVAL = 800;  // Cek sync lebih jarang (800ms)
    const DRIFT_THRESHOLD = 1.5;      // Threshold lebih besar (1.5 detik)
    const HARD_SYNC_THRESHOLD = 3.0;  // Hard jump threshold lebih besar
    const PLAYBACK_ADJUST = 0.02;     // Adjust speed lebih kecil (2%)
    const END_BUFFER = 2.0;           // Hide 2 detik sebelum akhir
    const SEEK_DEBOUNCE = 300;        // Debounce seek
    const MIN_BUFFERED_DURATION = 2.0; // Tunggu sampai 2 detik buffered sebelum play
    const SYNC_START_DELAY = 1000;    // Delay 1 detik sebelum mulai sync

    players.forEach(p => {
      const trigger = parseFloat(p.dataset.trigger);
      const videoEl = document.getElementById(p.dataset.video);
      const trackEl = p.closest('.track');
      const statusEl = trackEl.querySelector('.status-indicator');
      
      let started = false;
      let isVideoVisible = false;
      let syncTimer = null;
      let videoReady = false;
      let isBuffering = false;
      let videoDuration = 0;
      let isSeeking = false;
      let seekDebounceTimer = null;
      let isNearEnd = false;
      let syncStartTimer = null;
      let lastSyncPlaybackRate = 1.0;

      // Preload video saat user interact
      trackEl.addEventListener('mouseenter', () => {
        if (videoEl.readyState < 3) {
          videoEl.load();
          updateStatus('Preloading...');
        }
      }, { once: true });

      // Update status indicator
      function updateStatus(text) {
        statusEl.textContent = text;
        statusEl.className = 'status-indicator';
        if (text.includes('Buffering') || text.includes('Loading') || text.includes('Waiting')) {
          statusEl.classList.add('buffering');
        } else if (text.includes('Ready')) {
          statusEl.classList.add('ready');
          setTimeout(() => statusEl.style.display = 'none', 2000);
        }
      }

      // Helper: check apakah ada buffered data di target position
      function isBufferedAtTime(time) {
        if (!videoEl.buffered || videoEl.buffered.length === 0) return false;
        
        for (let i = 0; i < videoEl.buffered.length; i++) {
          const start = videoEl.buffered.start(i);
          const end = videoEl.buffered.end(i);
          if (time >= start && time <= end) {
            return true;
          }
        }
        return false;
      }

      // Helper: cek total buffered duration
      function getBufferedDuration() {
        if (!videoEl.buffered || videoEl.buffered.length === 0) return 0;
        let total = 0;
        for (let i = 0; i < videoEl.buffered.length; i++) {
          total += videoEl.buffered.end(i) - videoEl.buffered.start(i);
        }
        return total;
      }

      // Video event handlers
      videoEl.addEventListener('loadedmetadata', () => {
        videoDuration = videoEl.duration;
        updateStatus('Video Ready');
      });

      videoEl.addEventListener('canplay', () => {
        videoReady = true;
      });

      videoEl.addEventListener('canplaythrough', () => {
        videoReady = true;
        isBuffering = false;
      });

      videoEl.addEventListener('waiting', () => {
        isBuffering = true;
        updateStatus('Buffering...');
      });

      videoEl.addEventListener('playing', () => {
        isBuffering = false;
        statusEl.style.display = 'none';
      });

      videoEl.addEventListener('stalled', () => {
        updateStatus('Network slow...');
      });

      // Detect video seeking
      videoEl.addEventListener('seeking', () => {
        isSeeking = true;
      });

      videoEl.addEventListener('seeked', () => {
        isSeeking = false;
      });

      // Error handling untuk video
      videoEl.addEventListener('error', (e) => {
        console.error('Video error:', e);
        updateStatus('Video error!');
        fullReset();
      });

      // Helper: cek apakah waktu valid untuk video
      function isValidVideoTime(time) {
        if (!videoDuration || videoDuration === 0) {
          videoDuration = videoEl.duration || 0;
        }
        return time >= 0 && time < (videoDuration - 0.1);
      }

      // Helper: clamp time ke range yang valid
      function clampVideoTime(time) {
        if (!videoDuration || videoDuration === 0) {
          videoDuration = videoEl.duration || 0;
        }
        const maxTime = Math.max(0, videoDuration - 0.2);
        return Math.max(0, Math.min(time, maxTime));
      }

      // Helper: cek apakah audio mendekati waktu dimana video akan habis
      function checkIfNearEnd() {
        if (!videoDuration) {
          videoDuration = videoEl.duration || 0;
        }
        if (videoDuration === 0) return false;
        
        const targetVideoTime = Math.max(0, p.currentTime - trigger);
        return targetVideoTime > (videoDuration - END_BUFFER);
      }

      // Full reset untuk cleanup
      function fullReset() {
        stopSync();
        if (seekDebounceTimer) {
          clearTimeout(seekDebounceTimer);
          seekDebounceTimer = null;
        }
        if (syncStartTimer) {
          clearTimeout(syncStartTimer);
          syncStartTimer = null;
        }
        videoEl.pause();
        videoEl.currentTime = 0;
        videoEl.playbackRate = 1.0;
        videoEl.style.display = "none";
        started = false;
        isVideoVisible = false;
        isNearEnd = false;
        isSeeking = false;
        lastSyncPlaybackRate = 1.0;
        if (isVideoVisible) {
          title.textContent = "Music Player";
        }
        statusEl.style.display = 'none';
      }

      function showVideoAt(time) {
        // Jangan show kalau mendekati akhir
        if (checkIfNearEnd()) {
          isNearEnd = true;
          fullReset();
          return;
        }

        isNearEnd = false;

        if (!isVideoVisible) {
          // Hide all other videos
          videos.forEach(v => {
            if (v !== videoEl) {
              v.pause();
              v.style.display = "none";
              v.playbackRate = 1.0;
            }
          });

          videoEl.style.display = "block";
          title.textContent = "EASTER EGG FOUND";
          isVideoVisible = true;
        }
        
        // Set video time dengan boundary check
        const targetTime = Math.max(0, time - trigger);
        const safeTime = clampVideoTime(targetTime);
        
        // Jangan seek kalau udah terlalu deket akhir
        if (!isValidVideoTime(safeTime)) {
          fullReset();
          return;
        }

        // Cek apakah ada buffered data di target position
        if (!isBufferedAtTime(safeTime) && getBufferedDuration() < MIN_BUFFERED_DURATION) {
          updateStatus('Buffering video...');
          // Wait for buffer, retry setelah 200ms
          setTimeout(() => {
            if (!p.paused && started) {
              showVideoAt(time);
            }
          }, 200);
          return;
        }

        videoEl.currentTime = safeTime;
        
        // Wait for buffer before playing
        const tryPlay = () => {
          if ((videoEl.readyState >= 2 || isBufferedAtTime(safeTime)) && !isSeeking) {
            const playPromise = videoEl.play();
            if (playPromise !== undefined) {
              playPromise.catch(err => {
                console.log("Play prevented:", err);
                // Retry after a short delay
                setTimeout(tryPlay, 200);
              });
            }
          } else {
            updateStatus('Buffering video...');
            setTimeout(tryPlay, 150);
          }
        };
        
        tryPlay();
        started = true;
        
        // Delay sebelum mulai sync untuk biar video settle dulu
        if (syncStartTimer) clearTimeout(syncStartTimer);
        syncStartTimer = setTimeout(() => {
          startSync();
        }, SYNC_START_DELAY);
      }

      function hideVideo() {
        fullReset();
      }

      function smoothSync() {
        // Jangan sync kalau lagi buffering, paused, atau seeking
        if (!p.paused && started && !isBuffering && !isSeeking && videoEl.readyState >= 2) {
          const audioTime = p.currentTime;
          const targetVideoTime = Math.max(0, audioTime - trigger);
          
          // PENTING: Jangan sync kalau video udah deket akhir
          if (!videoDuration) {
            videoDuration = videoEl.duration || 0;
          }
          
          // Stop sync dan hide kalau mendekati akhir
          if (videoDuration > 0 && targetVideoTime > (videoDuration - END_BUFFER)) {
            isNearEnd = true;
            fullReset();
            return;
          }

          const currentVideoTime = videoEl.currentTime;
          const drift = targetVideoTime - currentVideoTime;
          const absDrift = Math.abs(drift);

          // Hard sync jika drift SANGAT besar
          if (absDrift > HARD_SYNC_THRESHOLD) {
            const safeTime = clampVideoTime(targetVideoTime);
            // Pastikan ada buffered data sebelum seek
            if (isBufferedAtTime(safeTime) && !isSeeking) {
              videoEl.currentTime = safeTime;
            }
            videoEl.playbackRate = 1.0;
            lastSyncPlaybackRate = 1.0;
          }
          // Smooth sync dengan adjust playback rate (LESS AGGRESSIVE)
          else if (absDrift > DRIFT_THRESHOLD) {
            let newRate = 1.0;
            if (drift > 0) {
              // Video ketinggalan, percepat SEDIKIT
              newRate = 1.0 + PLAYBACK_ADJUST;
            } else {
              // Video terlalu cepat, pelanin SEDIKIT
              newRate = 1.0 - PLAYBACK_ADJUST;
            }
            
            // Jangan ubah playback rate kalo udah sama
            if (Math.abs(lastSyncPlaybackRate - newRate) > 0.001) {
              videoEl.playbackRate = newRate;
              lastSyncPlaybackRate = newRate;
            }
          } else {
            // Sudah sync, reset ke normal speed
            if (lastSyncPlaybackRate !== 1.0) {
              videoEl.playbackRate = 1.0;
              lastSyncPlaybackRate = 1.0;
            }
          }
        }
      }

      function startSync() {
        stopSync();
        syncTimer = setInterval(smoothSync, SYNC_CHECK_INTERVAL);
      }

      function stopSync() {
        if (syncTimer) {
          clearInterval(syncTimer);
          syncTimer = null;
        }
      }

      // Audio play event
      p.addEventListener("play", () => {
        // Reset near-end flag saat play ulang
        isNearEnd = false;

        // Pause other players
        players.forEach(o => { 
          if (o !== p) o.pause();
        });

        // Reset other videos
        videos.forEach(v => { 
          if (v !== videoEl) { 
            v.pause(); 
            v.currentTime = 0;
            v.playbackRate = 1.0;
            v.style.display = "none"; 
          }
        });

        // Cek apakah mendekati akhir
        if (checkIfNearEnd()) {
          isNearEnd = true;
          fullReset();
          return;
        }

        // Show video if past trigger
        if (p.currentTime >= trigger && !isNearEnd) {
          showVideoAt(p.currentTime);
        } else if (started && videoEl.paused && !isNearEnd) {
          videoEl.play().catch(() => {});
        }
      });

      // Audio time update
      p.addEventListener("timeupdate", () => {
        const t = p.currentTime;
        
        // Cek near end
        if (checkIfNearEnd()) {
          if (!isNearEnd) {
            isNearEnd = true;
            fullReset();
          }
          return;
        } else {
          isNearEnd = false;
        }
        
        // Trigger video saat mencapai waktu
        if (!started && t >= trigger && !p.paused && !isNearEnd) {
          showVideoAt(t);
        }
        
        // Hide video saat audio selesai
        if (started && p.ended) {
          fullReset();
        }
      });

      // Audio seek event dengan debounce
      p.addEventListener("seeking", () => {
        // Stop sync saat seeking untuk prevent race condition
        stopSync();
      });

      p.addEventListener("seeked", () => {
        // Clear debounce timer sebelumnya
        if (seekDebounceTimer) {
          clearTimeout(seekDebounceTimer);
        }

        // Debounce untuk handle spam seeking
        seekDebounceTimer = setTimeout(() => {
          const t = p.currentTime;
          
          // Reset near-end flag
          isNearEnd = false;

          // Cek apakah mendekati akhir
          if (checkIfNearEnd()) {
            isNearEnd = true;
            fullReset();
            return;
          }

          // Show atau hide berdasarkan posisi
          if (t >= trigger && !p.paused && !isNearEnd) {
            // Full reset dulu untuk cleanup state
            fullReset();
            // Tunggu sebentar baru show lagi
            setTimeout(() => {
              if (!p.paused && !isNearEnd) {
                showVideoAt(t);
              }
            }, 50);
          } else {
            fullReset();
          }
        }, SEEK_DEBOUNCE);
      });

      // Audio pause
      p.addEventListener("pause", () => {
        if (started) {
          videoEl.pause();
          videoEl.playbackRate = 1.0;
          lastSyncPlaybackRate = 1.0;
        }
      });

      // Video ended - hide everything
      videoEl.addEventListener("ended", () => {
        fullReset();
      });

      // Audio ended
      p.addEventListener("ended", () => {
        fullReset();
      });
    });

    // Cleanup on page visibility change
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        players.forEach(p => p.pause());
        videos.forEach(v => {
          v.pause();
          v.playbackRate = 1.0;
        });
      }
    });
  </script>
</body>
</html>
